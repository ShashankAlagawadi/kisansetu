<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="loginTitle">Login - KisanSetu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-green: #22c55e;
            --dark-green: #166534;
            --light-green: #dcfce7;
            --accent-orange: #f97316;
            --earth-brown: #92400e;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0fdf4 0%, #fff 50%, #fef3e2 100%);
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark-green);
            text-decoration: none;
        }

        .logo i {
            color: var(--primary-green);
            font-size: 2rem;
        }

        h2 {
            text-align: center;
            color: var(--dark-green);
            margin-bottom: 30px;
            font-size: 1.5rem;
        }

        /* Role Toggle */
        .role-toggle {
            display: flex;
            background: var(--light-green);
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 25px;
        }

        .role-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
        }

        .role-btn.active {
            background: var(--primary-green);
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .role-btn i {
            margin-right: 8px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .input-icon input {
            padding-left: 50px;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
        }

        .btn-login:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e5e7eb;
        }

        .links p {
            color: #6b7280;
            font-size: 14px;
        }

        .links a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* Error/Success Messages */
        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
            display: block;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
            display: block;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        .btn-login.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo -->
        <div class="logo">
            <a href="index-new.html">
                <i class="fas fa-leaf"></i>
                <span>KisanSetu</span>
            </a>
        </div>

        <!-- Back Button -->
        <button class="btn-back" onclick="goBack()" style="position: absolute; top: 20px; left: 20px; padding: 8px 16px; background: #f3f4f6; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> <span data-i18n="back">Back</span>
        </button>

        <h2 data-i18n="welcomeBack">Welcome Back!</h2>

        <!-- Role Toggle -->
        <div class="role-toggle">
            <button type="button" class="role-btn active" data-role="FARMER">
                <i class="fas fa-tractor"></i> <span data-i18n="farmer">Farmer</span>
            </button>
            <button type="button" class="role-btn" data-role="BUYER">
                <i class="fas fa-shopping-cart"></i> <span data-i18n="buyer">Buyer</span>
            </button>
        </div>

        <!-- Error/Success Messages -->
        <div id="message" class="message"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="email" data-i18n="emailLabel">Email Address</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Enter your email" data-i18n-placeholder="emailPlaceholder" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password" data-i18n="passwordLabel">Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" data-i18n-placeholder="passwordPlaceholder" required>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span class="spinner"></span>
                <span class="btn-text" data-i18n="loginBtn">Login</span>
            </button>
        </form>

        <div class="links">
            <p><span data-i18n="noAccount">Don't have an account?</span> <a href="register.html" data-i18n="registerHere">Register here</a></p>
        </div>
    </div>

    <script src="i18n.js"></script>

    <script>
        // API Configuration
        const API_BASE_URL = 'https://kisansetu-backend.onrender.com';
        
        // State
        let selectedRole = 'FARMER';

        // DOM Elements
        const roleBtns = document.querySelectorAll('.role-btn');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');

        // Role Toggle Handler
        roleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                roleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRole = btn.dataset.role;
            });
        });

        // Show Message Helper
        function showMessage(text, type = 'error') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 5000);
        }

        // Navigation Back Button
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index-new.html';
            }
        }

        // Loading State
        function setLoading(loading) {
            loginBtn.disabled = loading;
            loginBtn.classList.toggle('loading', loading);
            loginBtn.querySelector('.btn-text').textContent = loading ? 'Logging in...' : 'Login';
        }

        // Login Form Handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('Please fill in all fields');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store user data in localStorage
                    localStorage.setItem('kisansetu_user', JSON.stringify(data.user));
                    localStorage.setItem('kisansetu_token', Date.now().toString()); // Simple session

                    showMessage('Login successful! Redirecting...', 'success');

                    // Redirect based on role
                    setTimeout(() => {
                        if (data.user.role === 'FARMER') {
                            window.location.href = 'farmer-dashboard.html';
                        } else {
                            window.location.href = 'buyer-dashboard.html';
                        }
                    }, 1000);
                } else {
                    showMessage(data.message || 'Invalid email or password');
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Network error. Please check if the backend is running on port 8081.');
            } finally {
                setLoading(false);
            }
        });

        // Check if already logged in
        const user = localStorage.getItem('kisansetu_user');
        if (user) {
            const userData = JSON.parse(user);
            if (userData.role === 'FARMER') {
                window.location.href = 'farmer-dashboard.html';
            } else {
                window.location.href = 'buyer-dashboard.html';
            }
        }
    </script>
</body>
</html>
