<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="registerTitle">Register - KisanSetu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-green: #22c55e;
            --dark-green: #166534;
            --light-green: #dcfce7;
            --accent-orange: #f97316;
            --earth-brown: #92400e;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0fdf4 0%, #fff 50%, #fef3e2 100%);
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark-green);
            text-decoration: none;
        }

        .logo i {
            color: var(--primary-green);
            font-size: 2rem;
        }

        h2 {
            text-align: center;
            color: var(--dark-green);
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Role Toggle */
        .role-toggle {
            display: flex;
            background: var(--light-green);
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 25px;
        }

        .role-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
        }

        .role-btn.active {
            background: var(--primary-green);
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .role-btn i {
            margin-right: 8px;
        }

        /* Form Styles */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .input-icon input {
            padding-left: 50px;
        }

        /* Buyer-only fields */
        .buyer-field {
            display: none;
        }

        .buyer-field.visible {
            display: block;
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
        }

        .btn-register:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e5e7eb;
        }

        .links p {
            color: #6b7280;
            font-size: 14px;
        }

        .links a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* Messages */
        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
            display: block;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
            display: block;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        .btn-register.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .register-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <!-- Logo -->
        <div class="logo">
            <a href="index-new.html">
                <i class="fas fa-leaf"></i>
                <span>KisanSetu</span>
            </a>
        </div>

        <!-- Back Button -->
        <button class="btn-back" onclick="goBack()" style="position: absolute; top: 20px; left: 20px; padding: 8px 16px; background: #f3f4f6; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> <span data-i18n="back">Back</span>
        </button>

        <h2 data-i18n="createAccount">Create Account</h2>
        <p class="subtitle" data-i18n="joinSubtitle">Join the smart farming revolution</p>

        <!-- Role Toggle -->
        <div class="role-toggle">
            <button type="button" class="role-btn active" data-role="FARMER">
                <i class="fas fa-tractor"></i> <span data-i18n="farmer">Farmer</span>
            </button>
            <button type="button" class="role-btn" data-role="BUYER">
                <i class="fas fa-shopping-cart"></i> <span data-i18n="buyer">Buyer</span>
            </button>
        </div>

        <!-- Error/Success Messages -->
        <div id="message" class="message"></div>

        <!-- Registration Form -->
        <form id="registerForm">
            <!-- Name -->
            <div class="form-group">
                <label for="fullName" data-i18n="fullNameLabel">Full Name</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" data-i18n-placeholder="fullNamePlaceholder" required>
                </div>
            </div>

            <!-- Phone & Email Row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="phone" data-i18n="phoneLabel">Phone Number</label>
                    <div class="input-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone" name="phone" placeholder="Phone number" data-i18n-placeholder="phonePlaceholder" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email" data-i18n="emailLabel">Email Address</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="Email address" data-i18n-placeholder="emailPlaceholderReg" required>
                    </div>
                </div>
            </div>

            <!-- Buyer-only: Organization Name -->
            <div class="form-group buyer-field" id="orgField">
                <label for="organization" data-i18n="orgLabel">Organization Name</label>
                <div class="input-icon">
                    <i class="fas fa-building"></i>
                    <input type="text" id="organization" name="organization" placeholder="Your organization (optional)" data-i18n-placeholder="orgPlaceholder">
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password" data-i18n="passwordLabel">Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Create password (min 6 characters)" data-i18n-placeholder="passwordPlaceholderReg" required minlength="6">
                </div>
            </div>

            <button type="submit" class="btn-register" id="registerBtn">
                <span class="spinner"></span>
                <span class="btn-text" data-i18n="createAccountBtn">Create Account</span>
            </button>
        </form>

        <div class="links">
            <p><span data-i18n="alreadyAccount">Already have an account?</span> <a href="login.html" data-i18n="loginHere">Login here</a></p>
        </div>
    </div>

    <script src="i18n.js"></script>

    <script>
        // API Configuration
        const API_BASE_URL = 'https://kisansetu-backend-na6o.onrender.com';
        
        // State
        let selectedRole = 'FARMER';

        // DOM Elements
        const roleBtns = document.querySelectorAll('.role-btn');
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const messageDiv = document.getElementById('message');
        const orgField = document.getElementById('orgField');
        const orgInput = document.getElementById('organization');

        // Role Toggle Handler
        roleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                roleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRole = btn.dataset.role;
                
                // Show/hide buyer-only fields
                if (selectedRole === 'BUYER') {
                    orgField.classList.add('visible');
                    orgInput.required = false;
                } else {
                    orgField.classList.remove('visible');
                    orgInput.value = '';
                }
            });
        });

        // Show Message Helper
        function showMessage(text, type = 'error') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            if (type === 'error') {
                setTimeout(() => {
                    messageDiv.className = 'message';
                }, 5000);
            }
        }

        // Navigation Back Button
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        // Loading State
        function setLoading(loading) {
            registerBtn.disabled = loading;
            registerBtn.classList.toggle('loading', loading);
            registerBtn.querySelector('.btn-text').textContent = loading ? 'Creating Account...' : 'Create Account';
        }

        // Registration Form Handler
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const organization = document.getElementById('organization').value.trim();

            // Validation
            if (!fullName || !email || !phone || !password) {
                showMessage('Please fill in all required fields');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters');
                return;
            }

            setLoading(true);

            // Build request body based on role
            const requestBody = {
                fullName,
                email,
                password,
                phone,
                role: selectedRole,
                address: organization || '' // Use org as address for buyers, optional
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showMessage('Registration successful! Redirecting to login...', 'success');
                    
                    // Reset form
                    registerForm.reset();

                    // Redirect to login after delay
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showMessage(data.message || 'Registration failed. Please try again.');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showMessage('Network error. Please check if the backend is running on port 8081.');
            } finally {
                setLoading(false);
            }
        });

        // Check if already logged in
        const user = localStorage.getItem('kisansetu_user');
        if (user) {
            const userData = JSON.parse(user);
            if (userData.role === 'FARMER') {
                window.location.href = 'farmer-dashboard.html';
            } else {
                window.location.href = 'buyer-dashboard.html';
            }
        }
    </script>
</body>
</html>
